<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Performance Optimization Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-shell">
        <div class="container">
            <h1>Content Performance Optimization Dashboard</h1>
            <p class="subtitle">
                Review readability, structure, content depth, and keyword usage for SEO-focused writing.
            </p>

            <label for="keyword">Focus Keyword</label>
            <input type="text" id="keyword" placeholder="Enter an optional focus keyword">

            <label for="content">Content to Analyze</label>
            <textarea id="content" placeholder="Paste your article, landing page copy, or blog content here..."></textarea>

            <button id="analyzeBtn">Analyze Content</button>

            <div id="results"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
